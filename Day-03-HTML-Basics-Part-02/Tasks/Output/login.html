<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Registration Form</title>
  </head>
  <body>
    <h1>Registration Form</h1>

    <form>
      <label for="fname" accesskey="F">First Name:</label>
      <input type="text" id="fname" name="fname" required tabindex="1" />
      <br /><br />

      <label for="lname" accesskey="L">Last Name:</label>
      <input type="text" id="lname" name="lname" required tabindex="2" />
      <br /><br />

      <label for="email" accesskey="E">Email:</label>
      <input type="email" id="email" name="email" required tabindex="3" />
      <br /><br />

      <label for="password">Password:</label>
      <input type="password" id="password" name="password" tabindex="4" />
      <br /><br />

      <label for="rpassword">Repeat Password:</label>
      <input type="password" id="rpassword" name="rpassword" tabindex="5" />
      <br /><br />

      <label for="birth">Birth Date:</label>
      <input type="date" id="birth" name="birth" tabindex="6" />
      <br /><br />

      <label for="picture">User Picture:</label>
      <input type="file" id="picture" name="picture" tabindex="7" />
      <br /><br />

      <fieldset>
        <legend>Gender</legend>

        <input type="radio" id="male" name="gender" value="Male" tabindex="8" />
        <label for="male">Male</label>

        <input
          type="radio"
          id="female"
          name="gender"
          value="Female"
          tabindex="9"
        />
        <label for="female">Female</label>
      </fieldset>

      <br />

      <label for="faculty">Faculty:</label>
      <select id="faculty" name="faculty" tabindex="10">
        <option value="CS">Computer Science</option>
        <option value="Engineering">Engineering</option>
        <option value="Business">Business</option>
        <option value="Arts">Arts</option>
      </select>

      <br /><br />

      <fieldset>
        <legend>Interests</legend>

        <input
          type="checkbox"
          id="programming"
          name="interest"
          value="Programming"
        />
        <label for="programming">Programming</label>
        <br />

        <input type="checkbox" id="reading" name="interest" value="Reading" />
        <label for="reading">Reading</label>
        <br />

        <input type="checkbox" id="swimming" name="interest" value="Swimming" />
        <label for="swimming">Swimming</label>
      </fieldset>

      <br />

      <label for="about">About You:</label><br />

      <textarea id="about" name="about" rows="5" cols="40" tabindex="11">
      </textarea>

      <br /><br />

      <input type="checkbox" id="agree" required />

      <label for="agree">
        I agree to the
        <a href="terms.html" target="_blank"> Terms and Conditions </a>
      </label>

      <br /><br />

      <input type="submit" value="Submit" tabindex="12" />

      <input type="reset" value="Reset" />
    </form>
  </body>
</html>
